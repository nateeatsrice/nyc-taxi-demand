name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install deps (core + dev)
        run: uv pip install --system -e . --group dev

      - name: Ruff lint
        run: ruff check src tests flows

      - name: Ruff format check
        run: ruff format --check src tests flows

      - name: Pytest
        run: pytest -q --cov=nyc_taxi_demand --cov-report=term-missing
