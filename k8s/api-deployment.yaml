apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntd-api
  namespace: default
  labels: { app: ntd-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: ntd-api }
  template:
    metadata:
      labels: { app: ntd-api }
    spec:
      serviceAccountName: nyc-taxi-demand-sa
      containers:
        - name: api
          # TODO(you): set to <account>.dkr.ecr.<region>.amazonaws.com/nyc-taxi-demand:api-<tag>
          image: "<ECR_REPO_URL>:api-latest"
          ports:
            - containerPort: 8000
          env:
            - name: NTD_REGION
              value: "us-east-2" # TODO(you): confirm region
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ntd-api
  namespace: default
spec:
  selector: { app: ntd-api }
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
